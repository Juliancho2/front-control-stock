version: '3.9'

# ══════════════════════════════════════════════════════════════
# DESARROLLO — Frontend SvelteKit
# Comando: docker compose up -d
#
# El proxy de Vite reenvía /api/* al backend en localhost:3000
# Asegúrate de que el backend esté corriendo antes de levantar esto
# ══════════════════════════════════════════════════════════════

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ferreteria_frontend_dev
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      API_URL:         http://host.docker.internal:3000
      PUBLIC_API_URL:  http://localhost:3000
      PUBLIC_APP_URL:  http://localhost:5173
    volumes:
      # Hot reload
      - ./src:/app/src
      - ./static:/app/static
      - ./svelte.config.js:/app/svelte.config.js
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    extra_hosts:
      # Permite acceder al backend en el host desde dentro del container
      - 'host.docker.internal:host-gateway'