worker_processes auto;
error_log /var/log/nginx/error.log warn;

events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # ─── Gzip ─────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/javascript;

  # ─── Rate limiting ────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api_login:10m   rate=10r/m;

  # ─── Upstreams ────────────────────────────────────────────────
  upstream nestjs_api {
    server api:3000;
    keepalive 32;
  }

  upstream sveltekit_frontend {
    server frontend:3001;
    keepalive 16;
  }

  # ─── HTTP → HTTPS redirect ────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ─── HTTPS principal ──────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Login — rate limit estricto ──────────────────────────────
    location = /api/v1/auth/login {
      limit_req zone=api_login burst=5 nodelay;
      limit_req_status 429;
      proxy_pass       http://nestjs_api;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # ─── API NestJS ───────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_general burst=20 nodelay;
      limit_req_status 429;
      proxy_pass       http://nestjs_api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 60s;
    }

    # ─── Frontend SvelteKit (todo lo demás) ───────────────────────
    location / {
      proxy_pass       http://sveltekit_frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      # Necesario para SSE / streaming de SvelteKit
      proxy_set_header Connection "";
      proxy_buffering off;
    }

    # ─── Assets estáticos — cache agresivo ───────────────────────
    location ~* \.(js|css|png|ico|svg|woff2|webmanifest)$ {
      proxy_pass http://sveltekit_frontend;
      proxy_cache_valid 200 1d;
      add_header Cache-Control "public, max-age=86400, immutable";
    }

    location ~ /\. { deny all; }
  }
}